<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carré ou Cercle ?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 24px 0 8px;
      font-size: 2rem;
      color: #00d4ff;
      text-align: center;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 20px;
      text-align: center;
    }

    #app-container {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      max-width: 700px;
      width: 95%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #webcam-section {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #0f0f23;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    #webcam, #snapshot {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #snapshot { display: none; }

    #controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 12px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #0096ff;
      color: white;
    }
    .btn-primary:hover:not(:disabled) { background: #007acc; }

    .btn-secondary {
      background: #2d3a5c;
      color: #c0d0e0;
    }
    .btn-secondary:hover:not(:disabled) { background: #3d4a6c; }

    .btn-success {
      background: #00c853;
      color: white;
    }
    .btn-success:hover:not(:disabled) { background: #00a844; }

    .btn-danger {
      background: #e53935;
      color: white;
    }
    .btn-danger:hover:not(:disabled) { background: #c62828; }

    #shape-section {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    #shape-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #score-display {
      text-align: center;
      font-size: 1.3rem;
      padding: 12px;
      background: #0f0f23;
      border-radius: 10px;
    }

    #score-value {
      font-weight: 700;
      color: #00d4ff;
      font-size: 1.6rem;
    }

    #best-fit-info {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      font-size: 1.05rem;
      min-height: 1.5em;
    }

    .best-circle { color: #00c8ff; font-weight: 600; }
    .best-rect { color: #32dc64; font-weight: 600; }

    #status {
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 1.2em;
    }

    @media (max-width: 500px) {
      h1 { font-size: 1.4rem; }
      button { padding: 8px 14px; font-size: 0.85rem; }
      #score-display { font-size: 1.1rem; }
      #score-value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <h1>Carré ou Cercle ?</h1>
  <p class="subtitle">Quelle forme correspond le mieux à votre visage ?</p>

  <div id="app-container">
    <div id="webcam-section">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="snapshot"></canvas>
    </div>

    <div id="controls">
      <button id="btn-capture" class="btn-primary" disabled>Prendre une photo</button>
      <button id="btn-retake" class="btn-secondary" style="display:none">Reprendre</button>
    </div>

    <div id="shape-section">
      <div id="shape-controls">
        <button id="btn-circle" class="btn-primary">Cercle</button>
        <button id="btn-rectangle" class="btn-primary">Rectangle</button>
        <button id="btn-best-fit" class="btn-success">Meilleur ajustement</button>
        <button id="btn-clear" class="btn-danger">Effacer</button>
      </div>

      <div id="score-display">
        Score de similarité : <span id="score-value">--</span>
      </div>

      <div id="best-fit-info"></div>
    </div>

    <div id="status">Chargement...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script src="geometry.js"></script>
  <script src="scoring.js"></script>
  <script src="shapes.js"></script>
  <script src="app.js"></script>
</body>
</html>
